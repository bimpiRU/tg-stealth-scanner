services:
  ollama-init:
    image: python:3.12-slim-bookworm
    container_name: ollama-init
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: ["python", "/scripts/pull_model.py"]
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M

  tg-stealth-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-stealth-scanner
    env_file:
      - .env
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
      - ./data:/app/data
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: always
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 5G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
